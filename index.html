<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reforger Wind Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Arma Reforger Wind Calculator</h1>
    </header>

    <div class="columns">
      <form class="card inputs" id="calculator" onsubmit="return false;">
        <section class="section">
          <h2 class="section-title">Wind</h2>
          <div class="field-grid">
            <div class="field">
              <label for="windSpeed">Speed (m/s)</label>
              <input id="windSpeed" type="number" min="0" step="0.1" value="10">
            </div>
            <div class="field">
              <label for="windAzimuth">Azimuth (°)</label>
              <input id="windAzimuth" type="number" step="1" value="180">
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section-title">Target</h2>
          <div class="field-grid">
            <div class="field">
              <label for="targetAzimuth">Azimuth (°)</label>
              <input id="targetAzimuth" type="number" step="1" value="270">
            </div>
          <div class="field">
            <label for="distance">Distance (m)</label>
            <input id="distance" type="number" min="0" step="1" value="600">
          </div>
          <fieldset class="field field--full marker-field">
            <legend>Show target as</legend>
            <div class="radio-row">
              <label class="radio-option">
                <input type="radio" name="targetMarker" value="stick" checked>
                Green stick
              </label>
              <label class="radio-option">
                <input type="radio" name="targetMarker" value="soldier">
                Soldier (1.8 m)
              </label>
            </div>
          </fieldset>
        </div>
      </section>

        <section class="section">
          <h2 class="section-title">Scope</h2>
          <div class="field">
            <label for="artZoom">ART II zoom</label>
            <div class="scope-row">
              <select id="artZoom">
                <option value="3">3×</option>
                <option value="3.5">3.5×</option>
                <option value="4">4×</option>
                <option value="4.5">4.5×</option>
                <option value="5">5×</option>
                <option value="5.5">5.5×</option>
                <option value="6">6×</option>
                <option value="6.5">6.5×</option>
                <option value="7">7×</option>
                <option value="7.5">7.5×</option>
                <option value="8">8×</option>
                <option value="8.5">8.5×</option>
                <option value="9">9×</option>
              </select>
              <button type="button" class="zoom-suggest" id="zoomSuggest" hidden></button>
            </div>
          </div>
        </section>

        <details class="advanced">
          <summary>Advanced</summary>
          <div class="field">
            <label for="holdFormulaDivisor">Hold formula divisor</label>
            <input id="holdFormulaDivisor" type="number" min="1" step="1" value="1400" tabindex="-1">
            <p class="field-hint">Leave at 1400 unless you know what you are changing.</p>
          </div>
        </details>
      </form>

      <section class="output">
        <div class="card results" id="results" aria-live="polite">
          <div class="results-primary" id="resultHold">
            <span class="results-value">—</span>
          </div>
          <details class="results-more">
            <summary>Details</summary>
            <dl class="results-details">
              <div class="results-row">
                <dt>Crosswind</dt>
                <dd id="resultCrosswind">—</dd>
              </div>
              <div class="results-row">
                <dt>PSO-1</dt>
                <dd id="resultPso">—</dd>
              </div>
              <div class="results-row">
                <dt>ART II</dt>
                <dd id="resultArt">—</dd>
              </div>
            </dl>
          </details>
        </div>

        <div class="reticle-card">
          <h2 class="reticle-title">PSO-1 <span class="reticle-note">1 tick = 1 mil</span></h2>
          <canvas id="psoCanvas" width="400" height="90" aria-label="PSO-1 reticle hold visualization"></canvas>
        </div>
        <div class="reticle-card">
          <h2 class="reticle-title">ART II <span class="reticle-note">count dot spacings</span></h2>
          <canvas id="artCanvas" width="400" height="90" aria-label="ART II reticle hold visualization"></canvas>
        </div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
